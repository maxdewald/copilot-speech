name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package:
    if: ${{ needs.release.outputs.release_created == 'true' }}
    needs: release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
          - os: macos-15
            target: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test native helper
        run: pnpm native:configure && pnpm native:build && pnpm native:test

      - name: Build extension
        run: pnpm build

      - name: Prepare artifacts
        run: pnpm artifacts:prepare

      - name: Package extension
        run: pnpm exec vsce package --no-dependencies --target ${{ matrix.target }} --ignore-other-target-folders --out dist/artifacts/copilot-speech-${{ matrix.target }}.vsix

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: copilot-speech-${{ matrix.target }}
          path: dist/artifacts/copilot-speech-${{ matrix.target }}.vsix

  publish:
    if: ${{ needs.release.outputs.release_created == 'true' }}
    needs: [release, package]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: copilot-speech-*
          merge-multiple: true
          path: dist/artifacts

      - name: Upload VSIX to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release.outputs.tag_name }}" dist/artifacts/*.vsix

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: for package in dist/artifacts/*.vsix; do npx --yes ovsx@1.0.2 publish "$package"; done

      - name: Publish to Visual Studio Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: for package in dist/artifacts/*.vsix; do pnpm exec vsce publish --packagePath "$package"; done
